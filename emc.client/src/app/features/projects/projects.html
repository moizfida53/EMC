<!-- src/app/features/projects/projects.html -->

<!-- ── Roadmap view (when a project is selected) ─────────────────────── -->
<div *ngIf="openProject() as p" class="projects d-flex flex-column gap-4">
  <button class="projects__back" type="button" (click)="closeRoadmap()">
    <i class="bi bi-chevron-left" aria-hidden="true"></i>
    Back to projects
  </button>

  <app-roadmap [project]="p" />
</div>

<!-- ── List view (default) ────────────────────────────────────────────── -->
<div *ngIf="!openProject()" class="projects d-flex flex-column gap-4">

  <!-- Page header -->
  <app-page-header
    eyebrow="Project Portfolio"
    title="Engagements with BlueLink"
    description="A transparent view of every active and completed engagement, including BlueLink-led projects and joint delivery work. Internal financials are intentionally hidden.">
    <app-button slot="actions" variant="secondary" (clicked)="exportPortfolio()">
      <i class="bi bi-box-arrow-up me-1"></i>Export portfolio
    </app-button>
  </app-page-header>

  <!-- KPI strip -->
  <div class="row g-3">
    <div class="col-12 col-sm-6 col-xl-3">
      <app-kpi-card
        label="Active engagements"
        [value]="activeCount()"
        [active]="true" />
    </div>
    <div class="col-12 col-sm-6 col-xl-3">
      <app-kpi-card
        label="Avg completion"
        [value]="avgCompletion()"
        unit="%"
        hint="Across all engagements"
        [trend]="{ dir: 'up', text: '+4 pts WoW' }" />
    </div>
    <div class="col-12 col-sm-6 col-xl-3">
      <app-kpi-card
        label="Needs attention"
        [value]="needsAttention()"
        hint="At Risk or Off Track"
        [trend]="{ dir: 'flat', text: 'Action' }" />
    </div>
    <div class="col-12 col-sm-6 col-xl-3">
      <app-kpi-card
        label="Delivered · YTD"
        [value]="deliveredYtd()"
        hint="Completed in 2026" />
    </div>
  </div>

  <!-- Search + filters -->
  <app-searchbar
    placeholder="Search projects by name or description…"
    [query]="searchQuery()"
    (queryChange)="onSearch($event)"
    [filters]="searchFilters"
    (filtersChange)="onFiltersChange($event)" />

  <!-- Project grid -->
  <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3">
    <app-project-card
      class="col"
      *ngFor="let p of filtered()"
      [project]="p"
      (cardClick)="onCardClick(p.id)" />
  </div>

  <!-- Empty state -->
  <div *ngIf="filtered().length === 0" class="projects__empty surface-elev">
    <i class="bi bi-folder2-open projects__empty-icon" aria-hidden="true"></i>
    <p class="projects__empty-text mb-0">No projects match your filters.</p>
  </div>

</div>
