<!-- src/app/features/projects/components/project-card/project-card.html -->
<button
  class="project-card"
  type="button"
  (click)="cardClick.emit()">

  <!-- Status badges -->
  <div class="project-card__badges">
    <app-status-badge [value]="project().status" />
    <app-status-badge [value]="project().health" />
  </div>

  <!-- Title -->
  <h3 class="project-card__title">{{ project().name }}</h3>

  <!-- Description snippet -->
  <p class="project-card__desc line-clamp-2">{{ project().description }}</p>

  <!-- Progress bar -->
  <div class="project-card__progress">
    <app-mini-bar
      [value]="project().percentCompleted"
      [max]="100"
      [tone]="tone(project().health)" />
    <span class="project-card__pct num-tabular">{{ project().percentCompleted }}%</span>
  </div>

  <!-- Footer meta -->
  <div class="project-card__footer">
    <div class="project-card__meta-item">
      <span class="micro-label" style="font-size:10px">Window</span>
      <span class="project-card__meta-val num-tabular">
        {{ project().startDate | formatDate }} → {{ project().endDate | formatDate }}
      </span>
    </div>
    <div class="project-card__meta-item">
      <span class="micro-label" style="font-size:10px">Owner</span>
      <span class="project-card__meta-val">{{ ownerShort(project().owner) }}</span>
    </div>
  </div>

  <!-- Hover CTA -->
  <div class="project-card__cta" aria-hidden="true">Open roadmap →</div>

</button>
