<!-- src/app/features/projects/components/project-card/project-card.html -->
<button
  class="project-card surface-elev"
  type="button"
  (click)="cardClick.emit()">

  <!-- Status pills -->
  <div class="project-card__pills">
    <app-status-badge [value]="project().status" />
    <app-status-badge [value]="project().health" />
  </div>

  <!-- Title -->
  <h3 class="project-card__title font-display">
    {{ project().name }}
  </h3>

  <!-- Description -->
  <p class="project-card__description">
    {{ project().description }}
  </p>

  <!-- Progress -->
  <div class="project-card__progress">
    <div class="project-card__progress-bar-wrap">
      <app-mini-bar
        [value]="project().percentCompleted"
        [max]="100"
        [tone]="tone(project().health)" />
    </div>
    <span class="project-card__progress-pct num-tabular">
      {{ project().percentCompleted }}%
    </span>
  </div>

  <!-- Footer meta -->
  <div class="project-card__footer">
    <div class="project-card__meta-col">
      <div class="micro-label">Window</div>
      <div class="project-card__meta-value num-tabular">
        <i class="bi bi-calendar3 project-card__meta-icon" aria-hidden="true"></i>
        {{ project().startDate | formatDate }} → {{ project().endDate | formatDate }}
      </div>
    </div>
    <div class="project-card__meta-col">
      <div class="micro-label">Owner</div>
      <div class="project-card__meta-value">
        <i class="bi bi-person project-card__meta-icon" aria-hidden="true"></i>
        {{ ownerShort(project().owner) }}
      </div>
    </div>
  </div>

  <!-- Hover-revealed CTA -->
  <span class="project-card__cta">
    Open roadmap <i class="bi bi-arrow-right" aria-hidden="true"></i>
  </span>

</button>
