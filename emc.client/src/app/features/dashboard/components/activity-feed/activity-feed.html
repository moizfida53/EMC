<!-- src/app/features/dashboard/components/activity-feed/activity-feed.html -->
<div class="activity-feed surface-elev">
  <div class="activity-feed__header">
    <div class="activity-feed__header-content">
      <span class="activity-feed__eyebrow">Recent activity</span>
      <h3 class="activity-feed__title">What's been happening</h3>
    </div>
    <button type="button" class="activity-feed__view-all">View all</button>
  </div>

  <div class="activity-feed__list">
    <div *ngFor="let act of activities(); let last = last" class="activity-feed__item">
      <div class="activity-feed__timeline">
        <div class="activity-feed__icon-container">
          <i [ngClass]="icon(act.type)" aria-hidden="true"></i>
        </div>
        <div *ngIf="!last" class="activity-feed__line"></div>
      </div>

      <div class="activity-feed__content">
        <div class="activity-feed__item-header">
          <span class="activity-feed__type-pill">
            <span class="activity-feed__type-dot"></span>
            {{ act.type }}
          </span>
          <span class="activity-feed__time">{{ formatRelative(act.scheduledStart) }}</span>
        </div>
        <div class="activity-feed__subject">{{ act.subject }}</div>
        <div class="activity-feed__date">Scheduled {{ formatDateTime(act.scheduledStart) }}</div>
      </div>
    </div>
  </div>
</div>
