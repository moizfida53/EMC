<!-- src/app/features/dashboard/components/welcome-banner/welcome-banner.html -->
<section class="welcome-banner surface-elev position-relative overflow-hidden">

  <!-- Decorative process pattern (right side) -->
  <div class="welcome-banner__pattern" aria-hidden="true"></div>

  <div class="welcome-banner__inner position-relative">
    <div class="d-flex flex-column gap-3" style="max-width: 640px">
      <p class="micro-label welcome-banner__eyebrow mb-0">
        Welcome back · {{ today }}
      </p>

      <h1 class="welcome-banner__title font-display mb-0">
        Welcome back, {{ firstname() }}.
      </h1>

      <p class="welcome-banner__sub mb-0">
        Your engagement is
        <strong class="welcome-banner__sub--success">healthy</strong> overall.
        You have
        <strong>{{ activeTickets() }} active tickets</strong>
        and
        <strong class="welcome-banner__sub--warning">{{ expiringLicenses() }} licences</strong><br/>
        approaching renewal in the next 30 days.
      </p>

      <div class="d-flex flex-wrap gap-2 mt-2">
        <a routerLink="/support" class="text-decoration-none">
          <app-button variant="primary">
            Open new ticket
            <i class="bi bi-arrow-right ms-1"></i>
          </app-button>
        </a>
        <a routerLink="/projects" class="text-decoration-none">
          <app-button variant="secondary">
            View project portfolio
          </app-button>
        </a>
      </div>
    </div>
  </div>

</section>
