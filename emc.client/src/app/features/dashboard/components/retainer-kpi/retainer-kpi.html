<!-- src/app/features/dashboard/components/retainer-kpi/retainer-kpi.html -->
<app-kpi-card
  label="Retainer Health · Platinum"
  [value]="sa.availableBalanceQty"
  unit="/ {{ sa.contractedBalanceQty }} h"
  hint="{{ pctAvailable() }}% available · cycle ends {{ endDate }}"
  [active]="true"
  [trend]="{ dir: 'flat', text: 'Within SLA' }">

  <div class="retainer-kpi">
    <!-- Donut visualisation via a CSS conic-gradient -->
    <div
      class="retainer-kpi__donut"
      [style.--pct]="pctAvailable() + '%'"
      role="img"
      [attr.aria-label]="pctAvailable() + '% available'">
      <div class="retainer-kpi__donut-label">
        <span class="retainer-kpi__donut-value">{{ pctAvailable() }}%</span>
        <span class="retainer-kpi__donut-sub">Avail.</span>
      </div>
    </div>

    <!-- Legend rows -->
    <div class="retainer-kpi__legend">
      <div class="retainer-kpi__legend-row">
        <span class="retainer-kpi__dot retainer-kpi__dot--brand"></span>
        <span class="retainer-kpi__legend-label">Used</span>
        <span class="retainer-kpi__legend-value num-tabular">{{ used() }}h</span>
      </div>
      <div class="retainer-kpi__legend-row">
        <span class="retainer-kpi__dot retainer-kpi__dot--light"></span>
        <span class="retainer-kpi__legend-label">Available</span>
        <span class="retainer-kpi__legend-value num-tabular">{{ sa.availableBalanceQty }}h</span>
      </div>

      <!-- Progress bar -->
      <app-mini-bar
        [value]="used()"
        [max]="sa.contractedBalanceQty"
        [tone]="tone()"
        style="margin-top: 8px;" />
    </div>
  </div>

</app-kpi-card>
