<!-- src/app/features/dashboard/components/retainer-kpi/retainer-kpi.html -->
<app-kpi-card
  label="Retainer Health · Platinum"
  meta="Within SLA"
  [value]="sa.availableBalanceQty"
  [unit]="'/ ' + sa.contractedBalanceQty + ' hours'"
  [hint]="pctAvailable() + '% available · cycle ends ' + endDate"
  [active]="true"
>
  <div class="retainer-kpi">
    <div class="retainer-kpi__donut-container">
      <div class="retainer-kpi__donut" [style.--pct]="pctAvailable() + '%'">
        <div class="retainer-kpi__donut-content">
          <span class="retainer-kpi__donut-value">{{ pctAvailable() }}%</span>
          <span class="retainer-kpi__donut-sub">AVAIL.</span>
        </div>
      </div>
    </div>

    <div class="retainer-kpi__legend">
      <div class="retainer-kpi__legend-item">
        <span class="retainer-kpi__dot retainer-kpi__dot--used"></span>
        <span class="retainer-kpi__legend-label">Used</span>
        <span class="retainer-kpi__legend-value">{{ used() }}h</span>
      </div>
      <div class="retainer-kpi__legend-item">
        <span class="retainer-kpi__dot retainer-kpi__dot--available"></span>
        <span class="retainer-kpi__legend-label">Available</span>
        <span class="retainer-kpi__legend-value">{{ sa.availableBalanceQty }}h</span>
      </div>
    </div>
  </div>
</app-kpi-card>
