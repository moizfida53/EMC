<!-- src/app/features/knowledge/components/article-list/article-list.html -->

<!-- Empty state -->
<div *ngIf="articles().length === 0" class="article-list__empty surface-elev">
  No articles match your search.
</div>

<!-- Card grid -->
<div *ngIf="articles().length > 0" class="article-list__grid">

  <button
    *ngFor="let a of articles()"
    class="article-card"
    type="button"
    (click)="articleOpen.emit(a.id)">

    <!-- Meta row -->
    <div class="article-card__meta">
      <app-pill tone="brand">{{ subjectTitle(a.subjectId) }}</app-pill>
      <span class="article-card__date num-tabular">
        {{ a.publishOn | formatDate }}
      </span>
    </div>

    <!-- Title -->
    <h3 class="article-card__title">{{ a.title }}</h3>

    <!-- Snippet -->
    <p class="article-card__snippet line-clamp-2">{{ snippet(a.contentHtml) }}</p>

    <!-- Footer stats -->
    <div class="article-card__footer">
      <span class="article-card__stat">
        <!-- eye icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        {{ a.views.toLocaleString() }}
      </span>
      <span class="article-card__stat">
        <!-- thumbs-up icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
        {{ a.helpful }}%
      </span>
      <span class="article-card__read-more">
        Read article →
      </span>
    </div>

  </button>

</div>
