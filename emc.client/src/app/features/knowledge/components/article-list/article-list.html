<!-- src/app/features/knowledge/components/article-list/article-list.html -->

<!-- Empty state -->
<div *ngIf="articles().length === 0" class="article-list__empty surface-elev">
  <i class="bi bi-search article-list__empty-icon" aria-hidden="true"></i>
  <p class="article-list__empty-text mb-0">No articles match your search.</p>
</div>

<!-- Card grid -->
<div *ngIf="articles().length > 0" class="row g-3">
  <div *ngFor="let a of articles()" class="col-12 col-md-6">
    <button
      class="article-card surface-elev"
      type="button"
      (click)="articleOpen.emit(a.id)">

      <div class="article-card__head">
        <app-pill tone="brand">{{ subjectTitle(a.subjectId) }}</app-pill>
        <span class="article-card__date num-tabular">{{ a.publishOn | formatDate }}</span>
      </div>

      <h3 class="article-card__title font-display">{{ a.title }}</h3>

      <p class="article-card__snippet">{{ snippet(a.contentHtml) }}</p>

      <div class="article-card__foot">
        <span class="article-card__meta num-tabular">
          <i class="bi bi-eye" aria-hidden="true"></i>
          {{ a.views.toLocaleString() }}
        </span>
        <span class="article-card__meta num-tabular">
          <i class="bi bi-hand-thumbs-up" aria-hidden="true"></i>
          {{ a.helpful }}%
        </span>
        <span class="article-card__read">
          Read <i class="bi bi-arrow-right" aria-hidden="true"></i>
        </span>
      </div>
    </button>
  </div>
</div>
