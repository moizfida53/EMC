<!-- src/app/features/knowledge/components/article-detail/article-detail.html -->
<div class="article-detail d-flex flex-column gap-4">

  <button class="article-detail__back" type="button" (click)="back.emit()">
    <i class="bi bi-arrow-left" aria-hidden="true"></i>
    Back to knowledge base
  </button>

  <article class="article-detail__article surface-elev">
    <header class="article-detail__header">
      <div class="article-detail__header-top">
        <app-pill tone="brand">{{ subjectTitle(article().subjectId) }}</app-pill>
        <span class="article-detail__published num-tabular">
          Published {{ article().publishOn | formatDate }}
        </span>
      </div>

      <h1 class="article-detail__title font-display">{{ article().title }}</h1>

      <div class="article-detail__stats">
        <span class="article-detail__stat num-tabular">
          <i class="bi bi-eye" aria-hidden="true"></i>
          {{ article().views.toLocaleString() }} views
        </span>
        <span class="article-detail__stat num-tabular">
          <i class="bi bi-hand-thumbs-up" aria-hidden="true"></i>
          {{ article().helpful }}% found this helpful
        </span>
      </div>
    </header>

    <div class="article-detail__divider"></div>

    <div class="article-detail__content" [innerHTML]="article().contentHtml"></div>

    <div class="article-detail__feedback">
      <p class="micro-label mb-2">Was this article helpful?</p>
      <div class="article-detail__feedback-actions">
        <button type="button" class="article-detail__feedback-btn article-detail__feedback-btn--yes">
          <i class="bi bi-hand-thumbs-up" aria-hidden="true"></i>
          Yes, it solved my issue
        </button>
        <button type="button" class="article-detail__feedback-btn article-detail__feedback-btn--no">
          <i class="bi bi-life-preserver" aria-hidden="true"></i>
          Not quite — open a ticket
        </button>
      </div>
    </div>
  </article>
</div>
