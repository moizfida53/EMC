<div class="searchbar surface-elev d-flex align-items-center gap-2 gap-md-3 p-2 p-md-3 flex-narrow-stack">

  <!-- Search input + leading magnifier icon -->
  <div class="searchbar__input-wrap position-relative flex-grow-1 min-w-0">
    <i class="bi bi-search searchbar__leading-icon" aria-hidden="true"></i>
    <input
      type="search"
      class="form-control searchbar__input"
      [placeholder]="placeholder()"
      [(ngModel)]="query"
      aria-label="Search" />
  </div>

  <!-- Funnel filter icon -->
  <button
    *ngIf="showFilterIcon()"
    type="button"
    class="searchbar__filter-btn"
    (click)="onFilterIconClick()"
    aria-label="Open filters">
    <i class="bi bi-funnel" aria-hidden="true"></i>
  </button>

  <!-- Filter dropdowns -->
  <div *ngFor="let f of filters(); trackBy: trackByLabel"
       class="searchbar__filter">
    <select
      class="form-select searchbar__select"
      [attr.aria-label]="f.label"
      (change)="onFilterChange(f.label, $any($event.target).value)">
      <option *ngFor="let opt of f.options" [value]="opt">{{ opt }}</option>
    </select>
  </div>

</div>
