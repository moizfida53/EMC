<!-- emc.client/src/app/shared/ui/section-header/section-header.html -->
<div class="section-header">

  <div class="section-header__content">
    <div *ngIf="eyebrow()" class="section-header__eyebrow">
      {{ eyebrow() }}
    </div>
    <h2 class="section-header__title">{{ title() }}</h2>
    <p *ngIf="description()" class="section-header__description">
      {{ description() }}
    </p>
  </div>

  <!-- Optional action buttons via slot -->
  <div class="section-header__actions">
    <ng-content />
  </div>

</div>
