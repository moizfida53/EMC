<!-- emc.client/src/app/shared/ui/input/input.html -->

<div>

  <!-- Label -->
  <label
    *ngIf="label()"
    class="form-label text-uppercase fw-semibold mb-1 input-field__label"
    [for]="id()"
    [class.required]="required()">
    {{ label() }}
  </label>

  <!-- Input wrapper (handles absolute-positioned icons) -->
  <div [ngClass]="wrapperClasses()">

    <!-- Leading icon slot -->
    <span *ngIf="leadingIcon()" class="input-icon input-icon--lead">
      <ng-content select="[slot='leading']" />
    </span>

    <!-- Native input -->
    <input
      #inputRef
      class="form-control"
      [class.is-invalid]="hasError()"
      [id]="id()"
      [type]="type()"
      [placeholder]="placeholder()"
      [value]="_value()"
      [disabled]="_disabled()"
      [readonly]="readonly()"
      [required]="required()"
      [attr.aria-describedby]="(hint() || errorMessage()) ? id() + '-hint' : null"
      (input)="onInput($event)"
      (blur)="onBlur()"
      (focus)="onFocus()" />

    <!-- Trailing icon slot -->
    <span *ngIf="trailingIcon()" class="input-icon input-icon--trail">
      <ng-content select="[slot='trailing']" />
    </span>

  </div>

  <!-- Hint / error text -->
  <div
    *ngIf="(errorMessage() && _touched()) || hint()"
    class="form-text mt-1"
    [class.text-danger]="hasError()"
    [class.fw-medium]="hasError()"
    [id]="id() + '-hint'"
    role="alert"
    [attr.aria-live]="hasError() ? 'polite' : null">
    {{ hasError() ? errorMessage() : hint() }}
  </div>

</div>
